services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coursow
      POSTGRES_USER: coursow
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
