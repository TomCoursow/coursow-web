<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="projectCards(projects)" class="grid-layout">
    <div class="card-border-gradient" th:each="project : ${projects}">
        <div class="card-content">
            <h3 class="card-title-purple" th:class="${project.titleColorClass}" th:text="${project.name}">Multi-Node Landing Page Backend & AB-Test System</h3>
            <p class="card-subtitle" th:text="${project.company}">Innogames GmbH</p>
            <p class="card-description" th:text="${project.description}">Beschreibung</p>
            <div class="tech-stack">
                <span class="tech-tag-purple" th:each="tech : ${project.technologies}" th:class="${tech.colorClass}" th:text="${tech.name}">Java</span>
            </div>
            <a th:href="${project.link}" class="card-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3.2-.3 6.5-1.6 6.5-7.2A5.5 5.5 0 0 0 20 5.5a5 5 0 0 0-2-2.5c-.5-1.2-1.2-2-3-2.5-1.5-.5-3-.2-4.5-.2-1.5 0-3-.3-4.5.2-1.8.5-2.5 1.3-3 2.5a5 5 0 0 0-1.5 2.5A5.5 5.5 0 0 0 2 11.6c0 5.6 3.3 6.9 6.5 7.2a4.8 4.8 0 0 0-1 3.2v4"/></svg>
                Auf GitHub ansehen
            </a>
        </div>
    </div>
</div>
</body>
</html>
