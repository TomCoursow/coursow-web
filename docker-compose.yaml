services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coursow
      POSTGRES_USER: coursow
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursow"]
      interval: 10s
      timeout: 5s
      retries: 5

  coursow-web:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/coursow
      POSTGRES_USER: coursow
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
