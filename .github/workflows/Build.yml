# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Build the Spring Boot Thymeleaf Web App with Maven and Build and Deploy a Docker Image to DockerHub

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  # Build Spring Boot Thymelead Project with Maven / Java and Run Tests
  build-maven:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B verify --file pom.xml

  # Build the Docker Image and Push to DockerHub
  build-docker:
    needs: build-maven
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Get project version from pom.xml
        id: get_version
        run: |
          VERSION=$(grep -oP '(?<=<revision>)[^<]+' pom.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Image and Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/${{ secrets.DOCKERHUB_PROJECT }}:latest
            ${{ secrets.DOCKERHUB_USER }}/${{ secrets.DOCKERHUB_PROJECT }}:${{ steps.get_version.outputs.version }}
  
