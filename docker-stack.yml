version: "3.9"

services:
  coursow-web:
    image: tom-coursow/coursow-web:latest
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
    environment:
      SERVER_PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    networks:
      - coursow-web

networks:
  coursow-web:
    name: coursow-web
