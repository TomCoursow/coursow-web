version: "3.9"

services:
  coursow-web:
    image: tomcoursow/coursow-web:latest
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
    environment:
      SERVER_PORT: "8080"
      LOGGING_LEVEL: INFO
      POSTGRES_URL: jdbc:postgresql://postgres:5432/coursow
      POSTGRES_USER: coursow
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    networks:
      - coursow-web

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: coursow
      POSTGRES_USER: coursow
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - coursow-web
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coursow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

secrets:
  postgres_password:
    external: true

networks:
  coursow-web:
    name: coursow-web
